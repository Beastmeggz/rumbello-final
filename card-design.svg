  </text>

  <!-- Small photo box (left side) -->
  <rect x="60" y="230" width="220" height="220" rx="8" fill="#3a5a72" stroke="#555" stroke-width="2"/>
  <text x="170" y="340" font-family="Arial, sans-serif" font-size="32" fill="#999" text-anchor="middle">
