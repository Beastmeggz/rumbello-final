  <!-- Header text -->
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">
    Rumbello Auto Repair
  </text>
  <text x="60" y="155" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.95)">
