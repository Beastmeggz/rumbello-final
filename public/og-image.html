<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a3a52 0%, #2a4a62 100%);
      color: white;
      display: flex;
      align-items: center;
      padding: 40px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }
    .left { flex: 1; }
    .right { width: 15%; margin-left: 40px; }
    h1 { font-size: 56px; font-weight: 700; margin: 0; line-height: 1.1; }
    .orange { color: #ff6b35; }
    .tagline { font-size: 14px; color: #64b5f6; font-weight: 600; letter-spacing: 1px; margin-bottom: 16px; text-transform: uppercase; }
    .desc { font-size: 18px; color: rgba(255,255,255,0.8); margin: 20px 0; }
    .badges { display: flex; gap: 12px; margin: 20px 0; font-size: 14px; }
    .badge { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2); }
    .contact { font-size: 16px; color: rgba(255,255,255,0.7); margin-top: 20px; }
    .photo-box { background: #3a5a72; width: 100%; height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="left">
      <div style="font-size: 48px; margin-bottom: 16px;">🔧</div>
      <div class="tagline">Expert Auto Repair</div>
      <h1>Expert Auto Repair <span class="orange">You Can Trust</span></h1>
      <div class="desc">Full-Service Mechanic Shop • Whippany, NJ</div>
      <div class="badges">
        <div class="badge">20+ Years</div>
        <div class="badge">ASE-Certified</div>
        <div class="badge">4.8★ Rating</div>
      </div>
      <div class="contact">📞 (973) 515-8818</div>
    </div>
    <div class="right">
      <div class="photo-box">🚗</div>
    </div>
  </div>
</body>
</html>
